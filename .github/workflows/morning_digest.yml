name: Morning digest

on:
  schedule:
    # 7:30 МСК = 4:30 UTC (Москва UTC+3 круглый год)
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/send_digest.py

      - name: Save state and queue
        run: |
          git config user.name "linkedin-brand-agent"
          git config user.email "bot@users.noreply.github.com"
          git add data/queue.json data/state.json || true
          git diff --staged --quiet || git commit -m "chore: update digest state"
          git push
